<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-c2" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="70%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="flywheel-c2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#52525b"/>
      <stop offset="70%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <linearGradient id="rail-c2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#71717a"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <filter id="glow-c2">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg-c2)"/>
  <ellipse cx="300" cy="440" rx="240" ry="14" fill="#000" opacity="0.5"/>

  <!-- rail -->
  <rect x="60" y="352" width="470" height="14" rx="4" fill="url(#rail-c2)"/>
  <rect x="60" y="352" width="470" height="3" fill="#a1a1aa" opacity="0.5"/>

  <!-- legs -->
  <rect x="80" y="366" width="10" height="50" fill="#3f3f46"/>
  <rect x="495" y="366" width="10" height="50" fill="#3f3f46"/>
  <rect x="70" y="410" width="30" height="6" fill="#27272a"/>
  <rect x="485" y="410" width="30" height="6" fill="#27272a"/>

  <!-- flywheel housing (left) -->
  <g>
    <circle cx="120" cy="290" r="70" fill="url(#flywheel-c2)"/>
    <circle cx="120" cy="290" r="70" fill="none" stroke="#52525b" stroke-width="3"/>
    <!-- inner spokes -->
    <g stroke="#3f3f46" stroke-width="2" opacity="0.7">
      <line x1="120" y1="230" x2="120" y2="350"/>
      <line x1="60" y1="290" x2="180" y2="290"/>
      <line x1="78" y1="248" x2="162" y2="332"/>
      <line x1="78" y1="332" x2="162" y2="248"/>
    </g>
    <circle cx="120" cy="290" r="55" fill="none" stroke="#52525b" stroke-width="1" stroke-dasharray="3 4"/>
    <circle cx="120" cy="290" r="10" fill="#ea580c"/>
    <circle cx="120" cy="290" r="10" fill="none" stroke="#fb923c" stroke-width="1" filter="url(#glow-c2)"/>
  </g>

  <!-- chain to handle -->
  <line x1="180" y1="290" x2="280" y2="358" stroke="#a1a1aa" stroke-width="2" stroke-dasharray="2 2"/>

  <!-- seat -->
  <rect x="300" y="340" width="60" height="16" rx="4" fill="#3f3f46"/>
  <rect x="306" y="332" width="48" height="10" rx="3" fill="#52525b"/>

  <!-- PM5 monitor -->
  <rect x="420" y="280" width="100" height="70" rx="4" fill="#18181b" stroke="#52525b" stroke-width="2"/>
  <rect x="428" y="288" width="84" height="40" rx="2" fill="#09090b"/>
  <text x="470" y="313" text-anchor="middle" fill="#ea580c" font-family="monospace" font-size="12" font-weight="900">1:58.4</text>
  <text x="470" y="325" text-anchor="middle" fill="#52525b" font-family="monospace" font-size="7">500M SPLIT</text>
  <rect x="440" y="336" width="60" height="8" rx="1" fill="#52525b"/>
  <rect x="440" y="336" width="42" height="8" rx="1" fill="#ea580c"/>
  <!-- monitor stand -->
  <rect x="455" y="350" width="30" height="20" rx="2" fill="#27272a"/>
  <rect x="440" y="368" width="60" height="4" fill="#52525b"/>

  <!-- handle -->
  <rect x="260" y="356" width="60" height="8" rx="3" fill="#a1a1aa"/>

  <!-- brand -->
  <text x="300" y="555" text-anchor="middle" fill="#52525b" font-family="system-ui" font-size="12" font-weight="900" letter-spacing="5">CONCEPT2 · ROWERG</text>
  <line x1="200" y1="568" x2="400" y2="568" stroke="#ea580c" stroke-width="1" opacity="0.4"/>
</svg>
