<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-810xlt" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="70%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <linearGradient id="steel-810xlt" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#71717a"/>
      <stop offset="50%" stop-color="#52525b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="chrome-810xlt" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="50%" stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#71717a"/>
    </linearGradient>
    <linearGradient id="plate-810xlt" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <filter id="glow-810xlt" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg-810xlt)"/>

  <!-- floor shadow -->
  <ellipse cx="300" cy="510" rx="180" ry="14" fill="#000" opacity="0.5"/>

  <!-- vertical posts -->
  <rect x="150" y="100" width="20" height="400" rx="2" fill="url(#steel-810xlt)"/>
  <rect x="430" y="100" width="20" height="400" rx="2" fill="url(#steel-810xlt)"/>
  <!-- subtle highlight on posts -->
  <rect x="152" y="100" width="3" height="400" fill="#a1a1aa" opacity="0.6"/>
  <rect x="432" y="100" width="3" height="400" fill="#a1a1aa" opacity="0.6"/>

  <!-- top + bottom crossbars -->
  <rect x="150" y="100" width="300" height="20" rx="2" fill="url(#steel-810xlt)"/>
  <rect x="150" y="480" width="300" height="20" rx="2" fill="url(#steel-810xlt)"/>

  <!-- pull-up bar (chrome) -->
  <rect x="170" y="108" width="260" height="10" rx="5" fill="url(#chrome-810xlt)"/>

  <!-- hole pattern down the posts -->
  <g fill="#0a0a0a">
    <circle cx="160" cy="150" r="2"/><circle cx="160" cy="175" r="2"/><circle cx="160" cy="200" r="2"/>
    <circle cx="160" cy="225" r="2"/><circle cx="160" cy="250" r="2"/><circle cx="160" cy="275" r="2"/>
    <circle cx="160" cy="325" r="2"/><circle cx="160" cy="350" r="2"/><circle cx="160" cy="375" r="2"/>
    <circle cx="160" cy="400" r="2"/><circle cx="160" cy="425" r="2"/><circle cx="160" cy="450" r="2"/>
    <circle cx="440" cy="150" r="2"/><circle cx="440" cy="175" r="2"/><circle cx="440" cy="200" r="2"/>
    <circle cx="440" cy="225" r="2"/><circle cx="440" cy="250" r="2"/><circle cx="440" cy="275" r="2"/>
    <circle cx="440" cy="325" r="2"/><circle cx="440" cy="350" r="2"/><circle cx="440" cy="375" r="2"/>
    <circle cx="440" cy="400" r="2"/><circle cx="440" cy="425" r="2"/><circle cx="440" cy="450" r="2"/>
  </g>

  <!-- J-cups (orange glow) -->
  <g filter="url(#glow-810xlt)" opacity="0.6">
    <rect x="150" y="297" width="32" height="10" fill="#ea580c"/>
    <rect x="418" y="297" width="32" height="10" fill="#ea580c"/>
  </g>
  <rect x="150" y="298" width="32" height="8" rx="1" fill="#ea580c"/>
  <rect x="418" y="298" width="32" height="8" rx="1" fill="#ea580c"/>

  <!-- safety bars -->
  <rect x="170" y="378" width="260" height="5" rx="2" fill="#3f3f46"/>

  <!-- loaded barbell -->
  <rect x="90" y="288" width="420" height="14" rx="7" fill="url(#chrome-810xlt)"/>
  <!-- collars -->
  <rect x="172" y="284" width="6" height="22" fill="#52525b"/>
  <rect x="422" y="284" width="6" height="22" fill="#52525b"/>
  <!-- plates L -->
  <rect x="96" y="250" width="14" height="90" rx="2" fill="url(#plate-810xlt)"/>
  <rect x="82" y="262" width="12" height="66" rx="2" fill="url(#plate-810xlt)" opacity="0.85"/>
  <!-- plates R -->
  <rect x="490" y="250" width="14" height="90" rx="2" fill="url(#plate-810xlt)"/>
  <rect x="506" y="262" width="12" height="66" rx="2" fill="url(#plate-810xlt)" opacity="0.85"/>

  <!-- knurling marks on center -->
  <g stroke="#27272a" stroke-width="1">
    <line x1="260" y1="291" x2="260" y2="299"/>
    <line x1="270" y1="291" x2="270" y2="299"/>
    <line x1="280" y1="291" x2="280" y2="299"/>
    <line x1="290" y1="291" x2="290" y2="299"/>
    <line x1="310" y1="291" x2="310" y2="299"/>
    <line x1="320" y1="291" x2="320" y2="299"/>
    <line x1="330" y1="291" x2="330" y2="299"/>
    <line x1="340" y1="291" x2="340" y2="299"/>
  </g>

  <!-- Brand label -->
  <text x="300" y="555" text-anchor="middle" fill="#52525b" font-family="system-ui, -apple-system" font-size="12" font-weight="900" letter-spacing="5">FITNESS REALITY · 810XLT</text>
  <line x1="200" y1="568" x2="400" y2="568" stroke="#ea580c" stroke-width="1" opacity="0.4"/>
</svg>
