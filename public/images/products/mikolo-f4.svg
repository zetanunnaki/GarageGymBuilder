<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-mikolo" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="70%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <linearGradient id="steel-mikolo" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#71717a"/>
      <stop offset="50%" stop-color="#52525b"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="plate-mikolo" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <filter id="glow-mikolo">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg-mikolo)"/>
  <ellipse cx="300" cy="510" rx="180" ry="14" fill="#000" opacity="0.5"/>

  <!-- posts -->
  <rect x="140" y="80" width="22" height="420" rx="2" fill="url(#steel-mikolo)"/>
  <rect x="438" y="80" width="22" height="420" rx="2" fill="url(#steel-mikolo)"/>
  <rect x="142" y="80" width="4" height="420" fill="#a1a1aa" opacity="0.5"/>
  <rect x="440" y="80" width="4" height="420" fill="#a1a1aa" opacity="0.5"/>

  <!-- crossbars -->
  <rect x="140" y="80" width="320" height="22" rx="2" fill="url(#steel-mikolo)"/>
  <rect x="140" y="478" width="320" height="22" rx="2" fill="url(#steel-mikolo)"/>
  <rect x="162" y="90" width="276" height="8" rx="3" fill="#a1a1aa"/>

  <!-- hole pattern -->
  <g fill="#09090b">
    <circle cx="151" cy="130" r="2"/><circle cx="151" cy="155" r="2"/><circle cx="151" cy="180" r="2"/>
    <circle cx="151" cy="205" r="2"/><circle cx="151" cy="230" r="2"/><circle cx="151" cy="255" r="2"/>
    <circle cx="151" cy="280" r="2"/><circle cx="151" cy="330" r="2"/><circle cx="151" cy="355" r="2"/>
    <circle cx="151" cy="380" r="2"/><circle cx="151" cy="405" r="2"/><circle cx="151" cy="430" r="2"/>
    <circle cx="151" cy="455" r="2"/>
    <circle cx="449" cy="130" r="2"/><circle cx="449" cy="155" r="2"/><circle cx="449" cy="180" r="2"/>
    <circle cx="449" cy="205" r="2"/><circle cx="449" cy="230" r="2"/><circle cx="449" cy="255" r="2"/>
    <circle cx="449" cy="280" r="2"/><circle cx="449" cy="330" r="2"/><circle cx="449" cy="355" r="2"/>
    <circle cx="449" cy="380" r="2"/><circle cx="449" cy="405" r="2"/><circle cx="449" cy="430" r="2"/>
    <circle cx="449" cy="455" r="2"/>
  </g>

  <!-- J-cups glow -->
  <g filter="url(#glow-mikolo)" opacity="0.6">
    <rect x="138" y="296" width="26" height="12" fill="#ea580c"/>
    <rect x="436" y="296" width="26" height="12" fill="#ea580c"/>
  </g>
  <rect x="138" y="298" width="26" height="8" fill="#ea580c"/>
  <rect x="436" y="298" width="26" height="8" fill="#ea580c"/>

  <!-- lat pulldown cable + pulley -->
  <rect x="100" y="150" width="4" height="230" rx="2" fill="#d4d4d8"/>
  <rect x="94" y="148" width="16" height="22" rx="3" fill="#52525b"/>
  <rect x="85" y="372" width="35" height="16" rx="3" fill="#3f3f46"/>
  <rect x="496" y="150" width="4" height="230" rx="2" fill="#d4d4d8"/>
  <rect x="490" y="148" width="16" height="22" rx="3" fill="#52525b"/>
  <rect x="481" y="372" width="35" height="16" rx="3" fill="#3f3f46"/>

  <!-- barbell -->
  <rect x="90" y="288" width="420" height="14" rx="7" fill="#e4e4e7"/>
  <rect x="168" y="284" width="6" height="22" fill="#52525b"/>
  <rect x="426" y="284" width="6" height="22" fill="#52525b"/>
  <!-- plates -->
  <rect x="96" y="248" width="14" height="94" rx="2" fill="url(#plate-mikolo)"/>
  <rect x="82" y="260" width="12" height="70" rx="2" fill="url(#plate-mikolo)" opacity="0.85"/>
  <rect x="490" y="248" width="14" height="94" rx="2" fill="url(#plate-mikolo)"/>
  <rect x="506" y="260" width="12" height="70" rx="2" fill="url(#plate-mikolo)" opacity="0.85"/>

  <!-- brand -->
  <text x="300" y="555" text-anchor="middle" fill="#52525b" font-family="system-ui" font-size="12" font-weight="900" letter-spacing="5">MIKOLO · F4 POWER CAGE</text>
  <line x1="200" y1="568" x2="400" y2="568" stroke="#ea580c" stroke-width="1" opacity="0.4"/>
</svg>
