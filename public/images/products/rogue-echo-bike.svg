  <rect x="262" y="105" width="76" height="35" rx="4" fill="#27272a" stroke="#3f3f46" stroke-width="2"/>
  <text x="300" y="127" text-anchor="middle" fill="#ea580c" font-family="system-ui" font-size="10" font-weight="900">CAL 000</text>
  <!-- Pedals -->
  <rect x="230" y="440" width="40" height="10" rx="3" fill="#3f3f46"/>
  <rect x="330" y="440" width="40" height="10" rx="3" fill="#3f3f46"/>
  <!-- Base -->
  <rect x="180" y="470" width="240" height="8" rx="4" fill="#52525b"/>
  <text x="300" y="560" text-anchor="middle" fill="#3f3f46" font-family="system-ui" font-size="14" font-weight="900" letter-spacing="4">ROGUE ECHO BIKE</text>
</svg>
