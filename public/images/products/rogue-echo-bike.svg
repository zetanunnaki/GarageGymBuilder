<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="600" fill="#18181b"/>
  <!-- Frame -->
  <rect x="270" y="120" width="16" height="340" rx="4" fill="#52525b" transform="rotate(5 278 290)"/>
  <rect x="320" y="140" width="14" height="320" rx="4" fill="#52525b" transform="rotate(-8 327 300)"/>
  <!-- Fan housing -->
  <circle cx="300" cy="260" r="100" fill="none" stroke="#52525b" stroke-width="12"/>
  <circle cx="300" cy="260" r="85" fill="none" stroke="#3f3f46" stroke-width="2"/>
  <circle cx="300" cy="260" r="15" fill="#52525b"/>
  <!-- Fan blades -->
  <line x1="300" y1="180" x2="300" y2="260" stroke="#3f3f46" stroke-width="3"/>
  <line x1="300" y1="260" x2="300" y2="340" stroke="#3f3f46" stroke-width="3"/>
  <line x1="220" y1="260" x2="380" y2="260" stroke="#3f3f46" stroke-width="3"/>
  <line x1="244" y1="204" x2="356" y2="316" stroke="#3f3f46" stroke-width="3"/>
  <line x1="356" y1="204" x2="244" y2="316" stroke="#3f3f46" stroke-width="3"/>
  <!-- Handles -->
  <rect x="210" y="130" width="8" height="120" rx="4" fill="#71717a"/>
  <rect x="382" y="130" width="8" height="120" rx="4" fill="#71717a"/>
  <!-- Handle grips -->
  <rect x="206" y="130" width="16" height="40" rx="4" fill="#ea580c"/>
  <rect x="378" y="130" width="16" height="40" rx="4" fill="#ea580c"/>
  <!-- Seat -->
  <rect x="340" y="180" width="60" height="12" rx="6" fill="#3f3f46"/>
