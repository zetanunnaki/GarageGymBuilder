<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="600" fill="#18181b"/>
  <!-- Back legs -->
  <rect x="160" y="350" width="10" height="120" rx="3" fill="#52525b" transform="rotate(-10 165 410)"/>
  <rect x="200" y="350" width="10" height="120" rx="3" fill="#52525b" transform="rotate(-10 205 410)"/>
  <!-- Front legs -->
  <rect x="400" y="350" width="10" height="120" rx="3" fill="#52525b"/>
  <rect x="440" y="350" width="10" height="120" rx="3" fill="#52525b"/>
  <!-- Foot bars -->
  <rect x="135" y="460" width="100" height="8" rx="4" fill="#3f3f46"/>
  <rect x="380" y="460" width="90" height="8" rx="4" fill="#3f3f46"/>
  <!-- Adjustment frame -->
  <rect x="230" y="300" width="8" height="160" rx="2" fill="#3f3f46"/>
  <rect x="280" y="280" width="8" height="100" rx="2" fill="#3f3f46" transform="rotate(15 284 330)"/>
  <!-- Backrest pad (at incline) -->
  <rect x="140" y="180" width="180" height="200" rx="8" fill="#52525b" transform="rotate(-15 230 280)"/>
  <rect x="145" y="185" width="170" height="190" rx="6" fill="#3f3f46" transform="rotate(-15 230 280)"/>
  <!-- Seat pad -->
  <rect x="330" y="310" width="120" height="60" rx="8" fill="#52525b"/>
  <rect x="335" y="315" width="110" height="50" rx="6" fill="#3f3f46"/>
  <!-- Adjustment holes -->
  <circle cx="234" cy="330" r="3" fill="#ea580c"/>
  <circle cx="234" cy="350" r="3" fill="#52525b"/>
  <circle cx="234" cy="370" r="3" fill="#52525b"/>
  <circle cx="234" cy="390" r="3" fill="#52525b"/>
  <circle cx="234" cy="410" r="3" fill="#52525b"/>
  <!-- Pin -->
  <circle cx="234" cy="330" r="5" fill="none" stroke="#ea580c" stroke-width="2"/>
  <text x="300" y="560" text-anchor="middle" fill="#3f3f46" font-family="system-ui" font-size="14" font-weight="900" letter-spacing="4">FLYBIRD ADJUSTABLE BENCH</text>
</svg>
